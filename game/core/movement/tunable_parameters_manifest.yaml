version: 1
system: movement
parameters:
  - id: movement.acceleration
    type: float
    default: 10.0
    min: 4.0
    max: 20.0
    description: Rate of speed gain from rest/input.
  - id: movement.deceleration
    type: float
    default: 12.0
    min: 4.0
    max: 24.0
    description: Rate of speed loss when input is released/opposed.
  - id: movement.turning_inertia
    type: float
    default: 0.35
    min: 0.0
    max: 1.0
    description: Resistance to rapid heading changes.
