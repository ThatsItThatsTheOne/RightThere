version: 1
system: camera
parameters:
  - id: camera.isometric_angle_deg
    type: float
    default: 40.0
    min: 25.0
    max: 60.0
    description: Downward isometric pitch angle in degrees.
  - id: camera.smoothing_time_sec
    type: float
    default: 0.12
    min: 0.0
    max: 0.5
    description: Follow smoothing/interpolation time.
  - id: camera.rotate_enabled
    type: bool
    default: false
    description: Optional user-driven camera rotate toggle.
  - id: camera.rotate_speed_deg_per_sec
    type: float
    default: 120.0
    min: 30.0
    max: 240.0
    description: Rotation speed when rotate is enabled.
    requires:
      camera.rotate_enabled: true
